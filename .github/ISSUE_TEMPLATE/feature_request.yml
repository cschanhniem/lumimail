name: Feature request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What can't you do today, or what's painful? Focus on the need, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the behavior, not necessarily the implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: contribute
    attributes:
      label: Would you be willing to contribute this?
      options:
        - "Yes — I'd like to implement it"
        - "Maybe, with guidance"
        - "No, just suggesting"
    validations:
      required: false
