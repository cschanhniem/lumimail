name: Bug report
description: Report something that doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For **security vulnerabilities**, do not file here — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Include error messages, logs, or screenshots.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps. A failing test or curl command is ideal.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area
      description: Which surface? (e.g. webmail compose, IMAP bridge, domain provisioning, API)
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Local dev or deployed Worker? Node version, browser/client, commit SHA.
    validations:
      required: false
